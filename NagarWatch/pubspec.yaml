name: nagarwatch
description: "NagarWatch – Civic Engagement & Development Monitoring App for Bangladesh"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.1.0
  cloud_firestore: ^5.0.0
  firebase_messaging: ^15.0.0

  # State management
  provider: ^6.1.2

  # HTTP
  http: ^1.2.2

  # Location & Geofencing
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Image
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # Local storage (offline support)
  sqflite: ^2.3.2
  shared_preferences: ^2.2.3
  path: ^1.9.0

  # Connectivity
  connectivity_plus: ^5.0.2

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
